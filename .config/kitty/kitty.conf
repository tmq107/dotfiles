# kitty.conf

# Window size
initial_window_width 120c
initial_window_height 28c

# Font
font_size 13.0

# Padding
window_padding_width 10 10 8 8

# Theme
include themes/catppuccin_mocha.conf

# Background opacity
background_opacity 0.92

# Disable close confirmation
confirm_os_window_close 0

# Cursor
cursor_shape underline
cursor_blink_interval 0.5
cursor_underline_thickness 2

# Performance
repaint_delay 8
input_delay 0
sync_to_monitor yes

# Clipboard keybindings
map ctrl+v paste_from_clipboard
map ctrl+shift+v paste_from_clipboard
map ctrl+shift+c copy_to_clipboard

# Ctrl+C behavior:
# Kitty cannot directly do "copy if selection else send Ctrl+C" with a simple map.
# This sends Ctrl+C to terminal.
map ctrl+c send_text all \x03

# Mouse
mouse_map right press ungrabbed paste_from_clipboard

# Copy selection on left release to primary selection
copy_on_select clipboard

# Tabs
tab_bar_style powerline
tab_bar_edge top
tab_bar_min_tabs 1
tab_separator  " │ "

map ctrl+t new_tab_with_cwd
map ctrl+w close_tab

map ctrl+left previous_tab
map ctrl+right next_tab

map ctrl+1 goto_tab 1
map ctrl+2 goto_tab 2
map ctrl+3 goto_tab 3
map ctrl+4 goto_tab 4
map ctrl+5 goto_tab 5
map ctrl+6 goto_tab 6
map ctrl+7 goto_tab 7

