# kitty.conf

# Window size
initial_window_width 120c
initial_window_height 28c

# Font
font_size 13.0

# Padding
window_padding_width 10 10 8 8

# Theme
include themes/catppuccin_mocha.conf

# Background opacity
background_opacity 0.92

# Disable close confirmation
confirm_os_window_close 0

# Cursor
cursor_shape underline
cursor_blink_interval 0.5
cursor_underline_thickness 2

# Performance
repaint_delay 8
input_delay 0
sync_to_monitor yes

# Clipboard keybindings
map ctrl+v paste_from_clipboard
map ctrl+shift+v paste_from_clipboard
map ctrl+shift+c copy_to_clipboard

# Ctrl+C behavior:
# Kitty cannot directly do "copy if selection else send Ctrl+C" with a simple map.
# This sends Ctrl+C to terminal.
map ctrl+c send_text all \x03

# Mouse
mouse_map right press ungrabbed paste_from_clipboard

# Copy selection on left release to primary selection
copy_on_select clipboard

# Optional: no tab bar
# tab_bar_style hidden

# Optional: resize-only decorations equivalent depends on OS/window manager
# hide_window_decorations yes
