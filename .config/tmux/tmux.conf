# ================================================================
# TMUX CONFIG FOR QUAN (DEVOPS FLOW)
# Path: ~/.config/tmux/tmux.conf
# ================================================================

# ------------------------------------------------
# 0. TPM - Tmux Plugin Manager
# ------------------------------------------------
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'jaclu/tmux-menus'
# set -g @plugin 'christoomey/vim-tmux-navigator'

# ------------------------------------------------
# 1. Prefix: Ctrl+Space
# ------------------------------------------------
set -g prefix C-Space
unbind C-b
bind C-Space send-prefix

# ------------------------------------------------
# 2. Mouse support
# ------------------------------------------------
set -g mouse on

# ------------------------------------------------
# 3. Split panes in current directory
# ------------------------------------------------
bind v split-window -h -c "#{pane_current_path}"
bind h split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# ------------------------------------------------
# 4. New window in current directory
# ------------------------------------------------
bind c new-window -c "#{pane_current_path}"

# ------------------------------------------------
# 5. Move between panes with Alt + Arrow
# ------------------------------------------------
bind -n C-Left select-pane -L
bind -n C-Right select-pane -R
bind -n C-Up select-pane -U
bind -n C-Down select-pane -D

# Pass C-j through to applications (pi newline)
bind -n C-j send-keys C-j


# ------------------------------------------------
# 6. Log/history limit
# ------------------------------------------------
set -g history-limit 10000

# ------------------------------------------------
# 7. Start window/pane numbers from 1
# ------------------------------------------------
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# ------------------------------------------------
# 8. Better Vim/Neovim escape behavior
# ------------------------------------------------
set -s escape-time 0
set -g extended-keys on
set -g extended-keys-format csi-u

# ------------------------------------------------
# 9. Reload config
# ------------------------------------------------
bind r source-file ~/.config/tmux/tmux.conf \; display-message "Tmux config reloaded!"

# ------------------------------------------------
# 10. Status bar theme - Quan DevOps Purple/Pink
# ------------------------------------------------
set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-style "bg=colour236,fg=colour255"

# Left side: session
set -g status-left-length 40
set -g status-left "#[bg=colour141,fg=colour16,bold] #S #[bg=colour236,fg=colour141] "

# Window list
setw -g window-status-format "#[fg=colour249,bg=colour236] #I:#W "
setw -g window-status-current-format "#[bg=colour213,fg=colour16,bold] #I:#W #[bg=colour236,fg=colour213]"

# Right side: time/date
set -g status-right-length 40
set -g status-right "#[fg=colour213]| #[fg=colour219]%H:%M #[fg=colour255]%d-%m-%Y "

# Pane borders
set -g pane-border-style "fg=colour240"
set -g pane-active-border-style "fg=colour213"

# Messages
set -g message-style "bg=colour213,fg=colour16,bold"
set -g message-command-style "bg=colour236,fg=colour255"

# Copy mode highlight
set -g mode-style "bg=colour213,fg=colour16,bold"

# Passthrough
set -g allow-passthrough on

# tmux-menus:
# default is usually: prefix + \
# Use Ctrl+Space then \ first.
# Add custom bind only after checking the correct script path.

# ------------------------------------------------
# 13. Start TPM
# Keep this at the bottom
# ------------------------------------------------
run '~/.tmux/plugins/tpm/tpm'
